<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Zonas - Crecimiento Agua</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --verde:#22c55e;
    --rojo:#ef4444;
    --morado:#a855f7;
    --negro:#27272a;
    --bg:#0f1115;
    --panel:#181b21;
    --panel-border:#2a2e37;
    --text:#e7e9ee;
    --muted:#9aa1ad;
    --accent:#4f8cff;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}
  #app{position:relative;width:100%;height:100vh;min-height:560px;}
  #map{position:absolute;top:0;left:0;right:0;bottom:0;background:#0b0d11;}

  .leaflet-container{background:#e9ebee;}

  /* ---- Top bar ---- */
  #topbar{
    position:absolute; top:14px; left:14px; right:14px; z-index:1000;
    display:flex; align-items:flex-start; justify-content:space-between;
    gap:12px; pointer-events:none;
  }
  #titleCard{
    pointer-events:auto;
    background:rgba(24,27,33,0.92);
    backdrop-filter:blur(6px);
    border:1px solid var(--panel-border);
    border-radius:14px;
    padding:12px 16px;
    max-width:320px;
  }
  #titleCard h1{font-size:15px;margin:0 0 2px 0;font-weight:700;letter-spacing:.2px;}
  #titleCard p{font-size:12px;margin:0;color:var(--muted);}

  /* ---- Filter panel ---- */
  #filters{
    pointer-events:auto;
    background:rgba(24,27,33,0.92);
    backdrop-filter:blur(6px);
    border:1px solid var(--panel-border);
    border-radius:14px;
    padding:10px;
    display:flex; flex-direction:column; gap:6px;
    min-width:168px;
  }
  #filters .label{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:2px 4px 0 4px;}
  .filter-btn{
    appearance:none; border:1px solid var(--panel-border); background:#1f232b; color:var(--text);
    padding:7px 10px; border-radius:9px; font-size:12.5px; text-align:left; cursor:pointer;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    transition:background .15s ease, border-color .15s ease, transform .1s ease;
  }
  .filter-btn:hover{background:#262b34;}
  .filter-btn.active{background:var(--accent); border-color:var(--accent); color:white;}
  .filter-btn .count{font-size:10.5px; opacity:.75; font-variant-numeric:tabular-nums;}

  /* ---- Legend / bottom-left ---- */
  #legend{
    position:absolute; bottom:16px; left:14px; z-index:1000;
    background:rgba(24,27,33,0.92);
    backdrop-filter:blur(6px);
    border:1px solid var(--panel-border);
    border-radius:14px;
    padding:12px 14px;
    font-size:12.5px;
    min-width:190px;
  }
  #legend h2{font-size:11px;margin:0 0 8px 0;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;}
  .legend-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .legend-row:last-child{margin-bottom:0;}
  .swatch{width:12px;height:12px;border-radius:4px;flex:0 0 auto;}
  .legend-row .ltext{flex:1;}
  .legend-row .lcount{color:var(--muted); font-variant-numeric:tabular-nums; font-size:11.5px;}

  /* ---- Layer toggle bottom-right ---- */
  #layerToggle{
    position:absolute; bottom:16px; right:14px; z-index:1000;
    background:rgba(24,27,33,0.92);
    backdrop-filter:blur(6px);
    border:1px solid var(--panel-border);
    border-radius:14px;
    padding:8px;
    display:flex; gap:4px;
  }
  .toggle-btn{
    appearance:none; border:1px solid transparent; background:transparent; color:var(--muted);
    padding:7px 12px; border-radius:9px; font-size:12px; cursor:pointer; font-weight:600;
  }
  .toggle-btn.active{background:#1f232b; color:var(--text); border-color:var(--panel-border);}

  /* stats top right small */
  #statsCard{
    pointer-events:auto;
    background:rgba(24,27,33,0.92);
    backdrop-filter:blur(6px);
    border:1px solid var(--panel-border);
    border-radius:14px;
    padding:10px 14px;
    font-size:12px;
    text-align:right;
    color:var(--muted);
  }
  #statsCard b{color:var(--text); font-size:15px;}

  .leaflet-popup-content-wrapper{background:#181b21;color:#e7e9ee;border-radius:10px;}
  .leaflet-popup-tip{background:#181b21;}
  .leaflet-popup-content{margin:10px 12px;font-size:12.5px;}
  .leaflet-popup-content b{display:block;font-size:13px;margin-bottom:3px;}
  .popup-tag{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10.5px;font-weight:700;color:white;margin-top:4px;}

  @media (max-width:640px){
    #topbar{flex-direction:column;}
    #titleCard{max-width:none;}
    #filters{flex-direction:row;flex-wrap:wrap;}
    #statsCard{display:none;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="map"></div>

  <div id="topbar">
    <div style="display:flex; flex-direction:column; gap:10px;">
      <div id="titleCard">
        <h1>Zonas de crecimiento &mdash; Agua</h1>
        <p>Manchas de color por densidad de clientes, junio 2025 vs 2026</p>
      </div>
      <div id="filters">
        <div class="label">Localidad</div>
        <button class="filter-btn active" data-loc="ALL">Todos <span class="count" id="cnt-ALL"></span></button>

        <button class="filter-btn" data-loc="S">Sayula <span class="count" id="cnt-S"></span></button>
        <button class="filter-btn" data-loc="T">Tamazula <span class="count" id="cnt-T"></span></button>
      </div>
    </div>
    <div id="statsCard">
      <div><b id="statTotal">0</b> clientes</div>
      <div id="statLoc">Todas las localidades</div>
    </div>
  </div>

  <div id="legend">
    <h2>Colorimetr&iacute;a</h2>
    <div class="legend-row"><div class="swatch" style="background:var(--verde)"></div><div class="ltext">Crecimiento</div><div class="lcount" id="lc-V"></div></div>
    <div class="legend-row"><div class="swatch" style="background:var(--rojo)"></div><div class="ltext">Decrecimiento</div><div class="lcount" id="lc-R"></div></div>
    <div class="legend-row"><div class="swatch" style="background:var(--morado)"></div><div class="ltext">Nuevo</div><div class="lcount" id="lc-M"></div></div>
    <div class="legend-row"><div class="swatch" style="background:var(--negro)"></div><div class="ltext">Perdido</div><div class="lcount" id="lc-N"></div></div>
  </div>

  <div id="layerToggle">
    <button class="toggle-btn active" id="btnBlobs">Zonas</button>
    <button class="toggle-btn" id="btnPoints">Clientes</button>
  </div>
</div>

RISOL",344.4],[19.254138,-103.380148,"V","C","1-10015919-H/V GUILLE",6.3],[19.25545,-103.378486,"N","C","1-10022341-H/V LORENA",-100],[19.250928,-103.376807,"R","C","1-10026017-H/V MARIA DE LOS ANGELES",0],[19.25505,-103.37812,"R","C","1-10028541-H/V ANGEL",-71.4],[19.253977,-103.37946,"R","C","1-10030107-HV MARIA CANO",-36.7],[19.249042,-103.377203,"R","C","1-26135-EFREEN OLIVERA MEJIA",-54.5],[19.25362,-103.37936,"M","C","1-27907-RITA GUTIERREZ GUZMAN",null],[19.255258,-103.378547,"N","C","1-29424-BAUDELIA",-100],[19.256343,-103.374112,"M","C","1-29427-JUANA CERNAS",null],[19.25322,-103.37576,"R","C","1-30004992-H/V ZULEMA",0],[19.252482,-103.378823,"V","C","1-30006498-H/ DEISY",208.3],[19.252113,-103.373795,"M","C","1-30009928-H/V CARACOL",null],[19.2565,-103.372128,"N","C","1-80013-RAMONA GOMEZ",-100],[19.252962,-103.379258,"V","C","1-80128-REBECA MEJIA GARCIA",0.0],[19.253142,-103.380571,"R","C","1-80176-HUARACHERIA CASA DE LA MORA",-67.1],[19.251206,-103.379572,"N","C","1-80257-MA.DE JESUS MORFIN MEDRANO",-100]];
const BOUNDS = {"Colima": {"minLat": 18.93036, "maxLat": 19.503595, "minLon": -103.985357, "maxLon": -103.337334}, "Guzman": {"minLat": 19.456661, "maxLat": 19.879275, "minLon": -103.913565, "maxLon": -103.252772}, "Sayula": {"minLat": 19.865652, "maxLat": 20.047536, "minLon": -103.646118, "maxLon": -103.509176}, "Tamazula": {"minLat": 19.57397, "maxLat": 19.901494, "minLon": -103.342958, "maxLon": -103.035154}};

const COLOR_HEX = {V:'#22c55e', R:'#ef4444', M:'#a855f7', N:'#27272a'};
const COLOR_LABEL = {V:'Crecimiento', R:'Decrecimiento', M:'Nuevo', N:'Perdido'};
const LOC_NAME = {C:'Colima', G:'Guzm\u00e1n', S:'Sayula', T:'Tamazula'};
const LOC_KEY = {C:'Colima', G:'Guzman', S:'Sayula', T:'Tamazula'};

// ---------- MAP ----------
const map = L.map('map', {
  zoomControl:false,
  preferCanvas:true,
  minZoom:8,
  maxZoom:18
}).setView([19.4, -103.6], 9);

L.control.zoom({position:'bottomright'}).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd',
  maxZoom: 20,
  pane: 'shadowPane'
}).addTo(map);

// Blurred pane for the color "blobs"
map.createPane('blobPane');
map.getPane('blobPane').style.zIndex = 350;
map.getPane('blobPane').style.filter = 'blur(9px)';
map.getPane('blobPane').style.pointerEvents = 'none';

// Sharper pane for a soft core on top of the blur (adds density definition)
map.createPane('blobCorePane');
map.getPane('blobCorePane').style.zIndex = 360;
map.getPane('blobCorePane').style.filter = 'blur(2px)';
map.getPane('blobCorePane').style.pointerEvents = 'none';

// Points pane
map.createPane('pointsPane');
map.getPane('pointsPane').style.zIndex = 620;

// ---------- BUILD BLOB LAYERS ----------
const blobLayers = []; // {locCode, markers:[outer, core]}
const maxTotal = Math.max(...CELLS.map(c => c[4]));

function radiusFor(total){
  // sqrt scale, min/max clamp
  const r = 9 + 34 * Math.sqrt(total / maxTotal);
  return r;
}

CELLS.forEach(c => {
  const [loc, lat, lon, dom, total] = c;
  const color = COLOR_HEX[dom];
  const r = radiusFor(total);
  const opacity = Math.min(0.85, 0.35 + 0.5 * (total / maxTotal) * 3);

  const outer = L.circleMarker([lat, lon], {
    pane:'blobPane', radius:r, color:'transparent', weight:0,
    fillColor:color, fillOpacity:Math.min(0.75, opacity)
  });
  const core = L.circleMarker([lat, lon], {
    pane:'blobCorePane', radius:r*0.45, color:'transparent', weight:0,
    fillColor:color, fillOpacity:Math.min(0.9, opacity+0.25)
  });
  outer.locCode = loc; core.locCode = loc;
  blobLayers.push(outer, core);
});

// ---------- BUILD POINT LAYERS ----------
const pointLayers = [];
POINTS.forEach(p => {
  const [lat, lon, c, loc, cliente, crec] = p;
  const marker = L.circleMarker([lat, lon], {
    pane:'pointsPane', radius:3.4, weight:1, color:'rgba(255,255,255,0.55)',
    fillColor:COLOR_HEX[c], fillOpacity:0.9
  });
  const crecTxt = (crec === null || crec === undefined) ? 'N/D' : (crec>0?'+':'') + crec + '%';
  marker.bindPopup(
    '<b>' + (cliente || 'Cliente') + '</b>' +
    LOC_NAME[loc] + ' &middot; Crecimiento: ' + crecTxt +
    '<br><span class="popup-tag" style="background:' + COLOR_HEX[c] + '">' + COLOR_LABEL[c] + '</span>'
  );
  marker.locCode = loc;
  pointLayers.push(marker);
});

let blobsOn = true, pointsOn = false;
function renderLayers(){
  blobLayers.forEach(m => {
    const show = blobsOn && (currentFilter==='ALL' || m.locCode===currentFilter);
    if(show && !map.hasLayer(m)) m.addTo(map);
    if(!show && map.hasLayer(m)) map.removeLayer(m);
  });
  pointLayers.forEach(m => {
    const show = pointsOn && (currentFilter==='ALL' || m.locCode===currentFilter);
    if(show && !map.hasLayer(m)) m.addTo(map);
    if(!show && map.hasLayer(m)) map.removeLayer(m);
  });
}

// ---------- FILTERS ----------
let currentFilter = 'ALL';

function updateCountsAndStats(){
  const counts = {ALL:0, C:0, G:0, S:0, T:0};
  const colorCounts = {V:0,R:0,M:0,N:0};
  POINTS.forEach(p => {
    counts.ALL++;
    counts[p[3]]++;
    if(currentFilter==='ALL' || p[3]===currentFilter) colorCounts[p[2]]++;
  });
  ['ALL','C','G','S','T'].forEach(k => {
    const el = document.getElementById('cnt-'+k);
    if(el) el.textContent = counts[k].toLocaleString('es-MX');
  });
  document.getElementById('lc-V').textContent = colorCounts.V.toLocaleString('es-MX');
  document.getElementById('lc-R').textContent = colorCounts.R.toLocaleString('es-MX');
  document.getElementById('lc-M').textContent = colorCounts.M.toLocaleString('es-MX');
  document.getElementById('lc-N').textContent = colorCounts.N.toLocaleString('es-MX');

  const totalShown = currentFilter==='ALL' ? counts.ALL : counts[currentFilter];
  document.getElementById('statTotal').textContent = totalShown.toLocaleString('es-MX');
  document.getElementById('statLoc').textContent = currentFilter==='ALL' ? 'Todas las localidades' : LOC_NAME[currentFilter];
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.loc;
    renderLayers();
    updateCountsAndStats();

    if(currentFilter === 'ALL'){
      map.fitBounds([[18.85,-104.05],[20.12,-103.0]], {padding:[30,30]});
    } else {
      const b = BOUNDS[LOC_KEY[currentFilter]];
      map.fitBounds([[b.minLat, b.minLon],[b.maxLat, b.maxLon]], {padding:[40,40]});
    }
  });
});

document.getElementById('btnBlobs').addEventListener('click', function(){
  blobsOn = !blobsOn;
  this.classList.toggle('active', blobsOn);
  renderLayers();
});
document.getElementById('btnPoints').addEventListener('click', function(){
  pointsOn = !pointsOn;
  this.classList.toggle('active', pointsOn);
  renderLayers();
});

// initial render
renderLayers();
updateCountsAndStats();
map.fitBounds([[18.85,-104.05],[20.12,-103.0]], {padding:[30,30]});
</script>
